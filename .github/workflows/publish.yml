name: Publish to NPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Produce lockfile
        working-directory: ./packages/langchat
        run: npm install --package-lock-only

      - name: Install dependencies
        working-directory: ./packages/langchat
        run: npm ci

      - name: Run linting
        working-directory: ./packages/langchat
        run: npm run lint

      - name: Run tests
        working-directory: ./packages/langchat
        run: npm run test

      - name: Build library
        working-directory: ./packages/langchat
        run: npm run build

      - name: Check build output
        working-directory: ./packages/langchat
        run: ls -la dist/

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Produce lockfile
        working-directory: ./packages/langchat
        run: npm install --package-lock-only

      - name: Install dependencies
        working-directory: ./packages/langchat
        run: npm ci

      - name: Build library
        working-directory: ./packages/langchat
        run: npm run build

      - name: Publish to NPM
        working-directory: ./packages/langchat
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
